content_roots = ["nodus"]
[mcp_servers.grapha]
command = "grapha"
args = ["serve", "--mcp", "--watch", "-p", "."]

[adapters]
enabled = ["claude", "codex"]
[[hooks]]
id = "nodus.sync_on_startup"
event = "session_start"
[hooks.matcher]
sources = ["startup", "resume"]
[hooks.handler]
type = "command"
command = "nodus sync"

[dev-dependencies]
ena = { github = "oops-rs/ena", branch = "main" }
fuli = { github = "oops-rs/fuli", branch = "main" }
