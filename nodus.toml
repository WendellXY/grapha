content_roots = ["nodus"]

[adapters]
enabled = ["claude"]

[dev-dependencies]
codex_plugin_cc = { github = "openai/codex-plugin-cc", tag = "v1.0.2", members = [
    "codex",
] }
superpowers = { github = "obra/superpowers", branch = "main" }

[mcp_servers.grapha]
command = "grapha"
args = ["serve", "--mcp", "--watch", "-p", "."]
